<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JR東海風 発車標シミュレータ (長体対応版)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="display-board">
            <div class="board-header">
                <span class="col-type">種別</span>
                <span class="col-time">発車時刻</span>
                <span class="col-dest">行先</span>
                <span class="col-cars">両数</span>
                <span class="col-pos">乗車位置</span>
            </div>
            
            <div class="board-row">
                <span class="col-type"><div id="disp-type-1" class="type-box type-local">普　通</div></span>
                <span class="col-time" id="disp-time-1">10:26</span>
                <span class="col-dest">
                    <span id="disp-dest-1" class="dest-text">高　蔵　寺</span>
                </span>
                <span class="col-cars" id="disp-cars-1">8両</span>
                <span class="col-pos" id="disp-pos-1">○1～8</span>
            </div>

            <div class="board-row">
                <span class="col-type"><div id="disp-type-2" class="type-box type-semirapid">区間快速</div></span>
                <span class="col-time" id="disp-time-2">10:42</span>
                <span class="col-dest">
                    <span id="disp-dest-2" class="dest-text">中　津　川</span>
                </span>
                <span class="col-cars" id="disp-cars-2">8両</span>
                <span class="col-pos" id="disp-pos-2">○1～8</span>
            </div>
        </div>

        <div class="controls">
            <h3>表示設定</h3>
            <p><small>※長い駅名を入力すると自動で横幅が縮小されます</small></p>
            
            <div class="control-row">
                <h4>1段目</h4>
                <label>種別: 
                    <select id="input-type-1">
                        <option value="local" selected>普通</option>
                        <option value="semirapid">区間快速</option>
                        <option value="rapid">快速</option>
                        <option value="newrapid">新快速</option>
                    </select>
                </label>
                <label>時刻: <input type="text" id="input-time-1" value="10:26"></label>
                <label>行先: <input type="text" id="input-dest-1" value="高　蔵　寺"></label>
                <label>両数: <input type="text" id="input-cars-1" value="8両"></label>
                <label>位置: <input type="text" id="input-pos-1" value="○1～8"></label>
            </div>

            <div class="control-row">
                <h4>2段目</h4>
                <label>種別: 
                    <select id="input-type-2">
                        <option value="local">普通</option>
                        <option value="semirapid" selected>区間快速</option>
                        <option value="rapid">快速</option>
                        <option value="newrapid">新快速</option>
                    </select>
                </label>
                <label>時刻: <input type="text" id="input-time-2" value="10:42"></label>
                <label>行先: <input type="text" id="input-dest-2" value="中　津　川"></label>
                <label>両数: <input type="text" id="input-cars-2" value="8両"></label>
                <label>位置: <input type="text" id="input-pos-2" value="○1～8"></label>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
