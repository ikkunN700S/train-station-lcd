<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=900">
    <link rel="icon" type="image/svg+xml" href="./images/favicon/favicon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="./images/favicon/apple-touch-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="256x256" href="./images/favicon/android-chrome-256x256.png">
    <title>リアルタイム駅ホーム発車標</title>
    <link rel="stylesheet" href="./css/sub.css">
    </head>
<body>
    <div class="container">
        <h1>リアルタイム駅ホーム発車標</h1>

        <div class="boards-wrapper">
            <div class="board-section">
                <h2 class="board-title" id="board-title-1">画面1</h2>
                <div class="display-board" id="board-1">
                    <div class="board-header">
                        <span class="col-type">種別</span>
                        <span class="col-time">発車時刻</span>
                        <span class="col-dest">行先</span>
                        <span class="col-cars">両数</span>
                        <span class="col-pos">乗車位置</span>
                    </div>
                    <div class="board-row">
                        <span class="col-type"><div id="disp-type-1-1" class="type-box"></div></span>
                        <span class="col-time" id="disp-time-1-1"></span>
                        <span class="col-dest"><span id="disp-dest-1-1" class="dest-text"></span></span>
                        <span class="col-cars" id="disp-cars-1-1"></span>
                        <span class="col-pos" id="disp-pos-1-1"></span>
                    </div>
                    <div class="board-row">
                        <span class="col-type"><div id="disp-type-1-2" class="type-box"></div></span>
                        <span class="col-time" id="disp-time-1-2"></span>
                        <span class="col-dest"><span id="disp-dest-1-2" class="dest-text"></span></span>
                        <span class="col-cars" id="disp-cars-1-2"></span>
                        <span class="col-pos" id="disp-pos-1-2"></span>
                    </div>
                </div>
            </div>

            <div class="board-section">
                <h2 class="board-title" id="board-title-2">画面2</h2>
                <div class="display-board" id="board-2">
                    <div class="board-header">
                        <span class="col-type">種別</span>
                        <span class="col-time">発車時刻</span>
                        <span class="col-dest">行先</span>
                        <span class="col-cars">両数</span>
                        <span class="col-pos">乗車位置</span>
                    </div>
                    <div class="board-row">
                        <span class="col-type"><div id="disp-type-2-1" class="type-box"></div></span>
                        <span class="col-time" id="disp-time-2-1"></span>
                        <span class="col-dest"><span id="disp-dest-2-1" class="dest-text"></span></span>
                        <span class="col-cars" id="disp-cars-2-1"></span>
                        <span class="col-pos" id="disp-pos-2-1"></span>
                    </div>
                    <div class="board-row">
                        <span class="col-type"><div id="disp-type-2-2" class="type-box"></div></span>
                        <span class="col-time" id="disp-time-2-2"></span>
                        <span class="col-dest"><span id="disp-dest-2-2" class="dest-text"></span></span>
                        <span class="col-cars" id="disp-cars-2-2"></span>
                        <span class="col-pos" id="disp-pos-2-2"></span>
                    </div>
                </div>
            </div>

            <div class="board-section">
                <h2 class="board-title" id="board-title-3">画面3</h2>
                <div class="display-board" id="board-3">
                    <div class="board-header">
                        <span class="col-type">種別</span>
                        <span class="col-time">発車時刻</span>
                        <span class="col-dest">行先</span>
                        <span class="col-cars">両数</span>
                        <span class="col-pos">乗車位置</span>
                    </div>
                    <div class="board-row">
                        <span class="col-type"><div id="disp-type-3-1" class="type-box"></div></span>
                        <span class="col-time" id="disp-time-3-1"></span>
                        <span class="col-dest"><span id="disp-dest-3-1" class="dest-text"></span></span>
                        <span class="col-cars" id="disp-cars-3-1"></span>
                        <span class="col-pos" id="disp-pos-3-1"></span>
                    </div>
                    <div class="board-row">
                        <span class="col-type"><div id="disp-type-3-2" class="type-box"></div></span>
                        <span class="col-time" id="disp-time-3-2"></span>
                        <span class="col-dest"><span id="disp-dest-3-2" class="dest-text"></span></span>
                        <span class="col-cars" id="disp-cars-3-2"></span>
                        <span class="col-pos" id="disp-pos-3-2"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <h3>表示設定 (手動保存)</h3>
            <p><small>選択後、「設定を保存」ボタンを押すまで適用・保存されません。</small></p>
            
            <div class="control-row">
                <label>画面1のダイヤ: 
                    <select class="schedule-select" id="select-board-1"></select>
                </label>
            </div>

            <div class="control-row">
                <label>画面2のダイヤ: 
                    <select class="schedule-select" id="select-board-2"></select>
                </label>
            </div>

            <div class="control-row">
                <label>画面3のダイヤ: 
                    <select class="schedule-select" id="select-board-3"></select>
                </label>
            </div>

            <div class="save-actions">
                <button id="btn-save" class="btn-primary">設定を保存して適用</button>
                <span id="save-message" class="msg-hidden">保存しました！</span>
            </div>
        </div>

        <p><small><div class="link"><a href="./play.html" class="home-link">発車標であそぶ</a></div></small></p>
    </div>

    <footer>
        <p>&copy; 2026 ikkunN700S</p>
        <p id="site-version"></p>
        <a href="https://github.com/ikkunN700S/train-station-lcd#%E9%A7%85%E3%83%9B%E3%83%BC%E3%83%A0%E7%99%BA%E8%BB%8A%E6%A8%99%E3%82%B7%E3%83%9F%E3%83%A5%E3%83%AC%E3%83%BC%E3%82%BF" target="_blank" rel="noopener noreferrer" class="footer-link">使用方法はこちら</a>
        <a href="" id="share-link" class="footer-link">ページを共有する</a>
    </footer>

    <script src="./js/config.js"></script>
    <script src="./js/sub.js"></script>
    <script src="./js/version.js"></script>
    <script src="./js/sharelink.js"></script>
</body>
</html>
